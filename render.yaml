services:
  - type: web
    name: docsense
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/backend/chroma_db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: DATABASE_URL
        fromDatabase:
          name: docsense-db
          property: connectionString

databases:
  - name: docsense-db
    databaseName: docsense
    user: docsense
    plan: starter
